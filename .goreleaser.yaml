version: 2

project_name: lazypprof

builds:
  - main: ./cmd/lazypprof
    binary: lazypprof
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: owenrumney
      name: homebrew-tap
    homepage: https://github.com/owenrumney/lazypprof
    description: Terminal UI for exploring Go pprof profiles
